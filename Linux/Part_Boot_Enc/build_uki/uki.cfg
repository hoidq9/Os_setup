[UKI]
Linux=/boot/vmlinuz-6.12.0-124.43.1.el10_1.x86_64
Initrd=/boot/initramfs-6.12.0-124.43.1.el10_1.x86_64.img
Cmdline=@/etc/kernel/cmdline
OSRelease=@/etc/os-release
PCRBanks=sha256
SecureBootSigningTool=systemd-sbsign
SecureBootPrivateKey=/uki/secureboot-private-key.pem
SecureBootCertificate=/uki/secureboot-certificate.pem
[PCRSignature:default]
PCRPrivateKey=/etc/systemd/tpm2-pcr-private-key.pem
PCRPublicKey=/etc/systemd/tpm2-pcr-public-key.pem