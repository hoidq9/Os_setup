[UKI]
Linux=(vmlinuz)
Initrd=(initramfs)
Cmdline=(cmdline)
OSRelease=@/etc/os-release
PCRBanks=sha256
SecureBootPrivateKey=(private-key)
SecureBootCertificate=(certificate)
SecureBootSigningTool=systemd-sbsign
SignKernel=yes
PCRBanks=sha256
SBAT=sbat,1,SBAT Version,sbat,1,https://github.com/rhboot/shim/blob/main/SBAT.md
     uki.author.myimage,1,UKI for System,uki.author.myimage,1,https://uapi-group.org/specifications/specs/unified_kernel_image/

[PCRSignature:default]
PCRPrivateKey=/etc/systemd/tpm2-pcr-private-key.pem
PCRPublicKey=/etc/systemd/tpm2-pcr-public-key.pem